<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f7fa;
      color: #333;
    }

    .page-wrapper {
      max-width: 960px;
      margin: 0 auto;
      padding: 36px 24px;
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .header h1 {
      margin: 0;
      font-size: 2.2rem;
      letter-spacing: 0.02em;
    }

    .grid {
      display: grid;
      gap: 24px;
      grid-template-columns: 1.2fr 1fr;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
      padding: 28px;
    }

    .card h2 {
      margin-top: 0;
      font-size: 1.2rem;
      color: #1a1a1a;
    }

    .contact-details,
    .address-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .contact-details li,
    .address-list li {
      margin-bottom: 16px;
      line-height: 1.6;
    }

    .contact-details strong,
    .address-list strong {
      display: inline-block;
      width: 90px;
      color: #555;
    }

    form {
      display: grid;
      gap: 18px;
    }

    label {
      display: block;
      font-size: 0.95rem;
      margin-bottom: 8px;
      color: #444;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid #d5d7dc;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 1rem;
      background: #fbfbff;
      box-sizing: border-box;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    button {
      background: #2a72ff;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px 18px;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s ease;
      width: fit-content;
    }

    button:hover {
      background: #1f5cd4;
    }

    @media (max-width: 760px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <header class="header">
      <p>Get in Touch</p>
      <h1>Contact Details</h1>
    </header>

    <div class="grid">
      <section class="card">
        <h2>Contact information</h2>
        <ul class="contact-details">
          <li><strong>Email:</strong> hello@example.com</li>
          <li><strong>Phone:</strong> +1 (555) 123-4567</li>
          <li><strong>Hours:</strong> Mon–Fri, 9am–6pm</li>
        </ul>

        <h2>Address</h2>
        <ul class="address-list">
          <li><strong>Street:</strong> 1234 Maple Avenue</li>
          <li><strong>City:</strong> Springfield, IL 62704</li>
          <li><strong>Country:</strong> United States</li>
        </ul>
      </section>

      <section class="card">
        <h2>Send a message</h2>
        <form>
          <div>
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your name" />
          </div>

          <div>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" />
          </div>

          <div>
            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="Write your message here..."></textarea>
          </div>

          <button type="submit">Send message</button>
        </form>
      </section>
    </div>
  </div>
</body>
</html>
